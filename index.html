<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.A.G.E. v2 — Clinical Trajectory Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23000'/><text x='3' y='24' font-family='monospace' font-size='22' fill='%235c94fc'>S</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:8px;image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges}
.main-wrap{display:flex;gap:8px;align-items:flex-start;width:100%;max-width:1200px}

/* Left panel — Trajectory */
.traj-panel{flex:1;min-width:0;background:#000;border:3px solid #c42110;padding:10px 12px;overflow-y:auto;max-height:98vh}

/* Right panel — Console */
.console-panel{width:340px;flex-shrink:0;background:#000;border:3px solid #5c94fc;padding:10px 12px;max-height:98vh;overflow-y:auto}

/* Responsive: stack on narrow screens */
@media(max-width:900px){
.main-wrap{flex-direction:column}
.traj-panel,.console-panel{width:100%;max-height:none}
}

/* NES Colors */
:root{
--red:#f83800;--yellow:#ffa800;--cyan:#00e8d8;--blue:#5c94fc;
--green:#39ff14;--magenta:#fc74fc;--grid:#0a4f0a;--grid-b:#1a7f1a;
--bg:#000;--border:#c42110;--border2:#5c94fc;--dim:#686868
}

/* Typography */
.title{text-align:center;font-size:18px;letter-spacing:5px;color:var(--blue);margin-bottom:1px}
.subtitle{text-align:center;font-size:8px;letter-spacing:2px;color:var(--blue);margin-bottom:4px;opacity:.8}
.info-line{display:flex;justify-content:space-between;font-size:11px;color:var(--blue);margin-bottom:6px;flex-wrap:wrap;gap:3px}
.info-line span{white-space:nowrap}

/* Lane containers */
.lane-wrap{margin-bottom:3px}
.lane-header{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:1px 4px;border-bottom:1px solid var(--grid)}
.lane-header .name{font-weight:bold;letter-spacing:1px}
.lane-header .score{font-size:11px;font-weight:bold}
.lane-header .arrow{font-size:13px;margin-left:6px}
.lane-canvas{width:100%;height:48px;display:block;border:1px solid var(--grid)}

/* Composite */
.composite-wrap{border:2px solid var(--blue);padding:5px 8px;margin:6px 0}
.composite-label{font-size:10px;color:var(--blue);letter-spacing:2px;margin-bottom:3px}
.composite-bar-bg{height:14px;background:#111;border:1px solid var(--grid);position:relative}
.composite-bar-fill{height:100%;transition:width .5s,background .5s}
.composite-val{position:absolute;right:4px;top:0;font-size:10px;line-height:14px;color:#fff;font-weight:bold}

/* DATA SPEAKS */
.data-speaks{text-align:center;font-size:11px;padding:7px;border:2px solid var(--blue);background:#0a0a0a;margin:6px 0;letter-spacing:1px;min-height:36px;transition:border-color .3s,color .3s}
.data-speaks.critical{color:var(--red);border-color:var(--red);animation:fastpulse .5s infinite}
.data-speaks.concerning{color:var(--yellow);border-color:var(--yellow);animation:slowpulse 2s infinite}
.data-speaks.stable{color:var(--cyan);border-color:var(--cyan)}
.data-speaks.discharge{color:var(--green);border-color:var(--green)}
@keyframes fastpulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes slowpulse{0%,100%{opacity:.8}50%{opacity:1}}

/* DOL axis */
.dol-axis{font-size:8px;color:var(--dim);display:flex;justify-content:space-between;padding:0 2px;margin-top:1px}

/* Time range buttons */
.range-btns{display:flex;gap:4px}
.range-btns button{background:none;border:1px solid var(--blue);color:var(--blue);font-family:inherit;font-size:9px;padding:1px 6px;cursor:pointer}
.range-btns button.active{background:var(--blue);color:#000}
.range-btns button:hover{background:var(--blue);color:#000}

/* Console tabs */
.tab-bar{display:flex;margin-bottom:12px;border-bottom:2px solid var(--blue)}
.tab-bar button{flex:1;background:none;border:none;color:var(--dim);font-family:inherit;font-size:11px;padding:6px 0;cursor:pointer;letter-spacing:1px;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-bar button.active{color:var(--yellow);border-bottom-color:var(--yellow)}
.tab-bar button:hover{color:var(--blue)}
.console-title{text-align:center;font-size:13px;color:var(--blue);margin-bottom:8px;letter-spacing:2px}

/* Form styling */
.form-section{margin-bottom:6px;border:1px solid #222;padding:5px 6px}
.form-section-title{font-size:10px;font-weight:bold;letter-spacing:1px;margin-bottom:4px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.form-section-title .chevron{transition:transform .2s}
.form-section-title .chevron.open{transform:rotate(90deg)}
.form-row{display:flex;gap:6px;margin-bottom:4px;align-items:center;flex-wrap:wrap}
.form-row label{font-size:9px;color:var(--blue);min-width:45px}
.form-row input,.form-row select{background:#000;color:var(--blue);border:1px solid var(--blue);padding:2px 4px;font-family:inherit;font-size:10px;width:70px}
.form-row select{width:90px}
.form-row input[type=checkbox]{width:auto;accent-color:var(--cyan)}
.form-notes{width:100%;background:#000;color:var(--blue);border:1px solid var(--blue);padding:4px;font-family:inherit;font-size:10px;resize:vertical;min-height:30px}

/* Buttons */
button{font-family:'Courier New',monospace;cursor:pointer}
.btn{background:var(--blue);color:#000;border:none;padding:4px 10px;font-size:11px;font-weight:bold;letter-spacing:1px}
.btn:hover{background:var(--red)}
.btn-sm{padding:2px 6px;font-size:9px}
.btn-red{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#000}
.btn-outline{background:none;border:1px solid var(--blue);color:var(--blue);padding:3px 8px;font-size:9px}
.btn-outline:hover{background:var(--blue);color:#000}

/* History entries */
.hist-entry{border:1px solid #222;padding:6px;margin-bottom:6px;font-size:10px;cursor:pointer;transition:border-color .2s}
.hist-entry:hover{border-color:var(--blue)}
.hist-entry.active{border-color:var(--yellow);box-shadow:0 0 6px rgba(255,168,0,.3)}
.hist-header{display:flex;justify-content:space-between;margin-bottom:4px;color:var(--yellow)}
.hist-scores{display:flex;gap:6px;flex-wrap:wrap}
.hist-scores span{font-size:9px}
.hist-controls{display:flex;gap:6px;margin-top:4px}

/* Import */
.import-area{width:100%;height:120px;background:#000;color:var(--green);border:1px solid var(--green);font-family:inherit;font-size:10px;padding:6px;resize:vertical}
.import-preview{max-height:200px;overflow:auto;font-size:9px;border:1px solid var(--dim);padding:6px;margin:8px 0}
.import-preview table{width:100%;border-collapse:collapse}
.import-preview th{background:#111;color:var(--blue);text-align:left;padding:2px 4px;font-size:8px;border:1px solid #333}
.import-preview td{padding:2px 4px;border:1px solid #222;font-size:9px}

/* Splash */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;width:100%;max-width:800px}
.splash-title{font-size:48px;letter-spacing:16px;color:var(--blue);margin-bottom:4px;text-shadow:3px 3px 0 #001a3a}
.splash-sub{font-size:10px;letter-spacing:3px;color:var(--blue);opacity:.7;margin-bottom:30px;text-align:center}
.splash-lines{width:600px;height:200px;margin-bottom:30px}
.splash-lines canvas{width:100%;height:100%}
.press-start{font-size:16px;color:var(--yellow);letter-spacing:4px;cursor:pointer;animation:slowpulse 1.5s infinite;background:none;border:2px solid var(--yellow);padding:10px 30px;font-family:inherit}
.press-start:hover{background:var(--yellow);color:#000}
.splash-credit{font-size:8px;color:var(--dim);margin-top:20px;letter-spacing:1px}

/* Setup screen */
.setup{max-width:500px;margin:0 auto;padding:40px 20px}
.setup-title{font-size:18px;color:var(--blue);letter-spacing:4px;text-align:center;margin-bottom:20px}
.setup-form{border:2px solid var(--blue);padding:20px}
.setup-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.setup-row label{font-size:12px;color:var(--blue);min-width:120px}
.setup-row input{background:#000;color:var(--cyan);border:1px solid var(--blue);padding:6px 8px;font-family:inherit;font-size:14px;width:100px}

/* Stats line */
.stat-line{font-size:10px;color:var(--blue);margin:2px 0;display:flex;align-items:center}
.stat-label{width:14px;text-align:center;margin-right:6px;font-weight:bold}
.stat-name{width:130px}
.stat-dots{color:var(--dim);letter-spacing:3px;flex:1}
.stat-value{width:30px;text-align:right;font-weight:bold}

/* Scrollbar */
.console-panel::-webkit-scrollbar{width:6px}
.console-panel::-webkit-scrollbar-track{background:#0a0a0a;border:1px solid #222}
.console-panel::-webkit-scrollbar-thumb{background:var(--blue)}
.console-panel::-webkit-scrollbar-thumb:hover{background:var(--red)}

/* Print */
@media print{body{background:#fff}.main-wrap{flex-direction:column}.traj-panel,.console-panel{width:100%;border-color:#000}.data-speaks{border-color:#000}}

/* Demo narration bar */
.demo-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.96);border-top:3px solid var(--blue);color:#fff;padding:14px 20px;z-index:10000;display:flex;align-items:center;gap:14px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);font-family:'Courier New',monospace}
.demo-bar.visible{transform:translateY(0)}
.demo-rec{width:8px;height:8px;background:#f83800;border-radius:50%;flex-shrink:0;animation:demoBlink 1.2s infinite}
@keyframes demoBlink{0%,100%{opacity:1}50%{opacity:.2}}
.demo-badge{background:var(--blue);color:#000;padding:3px 10px;font-size:10px;font-weight:bold;letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.demo-text{flex:1;min-width:0}
.demo-title{font-weight:bold;font-size:13px;margin-bottom:2px;color:var(--yellow)}
.demo-body{font-size:11px;color:#aaa;line-height:1.5}
.demo-comp{text-align:center;min-width:66px;flex-shrink:0}
.demo-comp-val{font-size:22px;font-weight:bold;line-height:1;transition:color .3s}
.demo-comp-lbl{font-size:8px;color:#686868;margin-top:2px;letter-spacing:1px}
.demo-stop{background:none;border:1px solid var(--red);color:var(--red);padding:5px 12px;font-family:inherit;font-size:10px;cursor:pointer;letter-spacing:1px;flex-shrink:0}
.demo-stop:hover{background:var(--red);color:#000}
@keyframes demoGlow{0%{box-shadow:0 0 0 2px rgba(92,148,252,.4)}50%{box-shadow:0 0 0 4px rgba(92,148,252,.7),0 0 12px rgba(92,148,252,.2)}100%{box-shadow:0 0 0 2px rgba(92,148,252,.4)}}
.demo-field-glow{animation:demoGlow .7s ease-in-out;border-color:var(--yellow)!important}
@keyframes demoPulse{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
.demo-pulse{animation:demoPulse .5s ease-in-out}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){'use strict';

/* ===== CONSTANTS ===== */
var DOMAINS=[
  {key:'resp', name:'RESPIRATORY',  color:'#f83800',short:'RESP'},
  {key:'hemo', name:'HEMODYNAMIC',  color:'#ffa800',short:'HEMO'},
  {key:'nutr', name:'NUTRITION',    color:'#00e8d8',short:'NUTR'},
  {key:'labs', name:'LABS/INFECTIOUS',color:'#39ff14',short:'LABS'},
  {key:'stab', name:'STABILITY',    color:'#fc74fc',short:'STAB'}
];
var COMP_TIERS=[
  {max:1.0,label:'CRITICAL TRAJECTORY',cls:'critical',color:'#f83800'},
  {max:2.0,label:'CONCERNING',cls:'concerning',color:'#ffa800'},
  {max:3.0,label:'STABLE',cls:'stable',color:'#00e8d8'},
  {max:4.0,label:'TRENDING TOWARD DISCHARGE',cls:'discharge',color:'#39ff14'}
];
var VENT_MODES=['','RA','NC','HFNC','CPAP','NIPPV','CMV','HFOV','HFJV'];
var CXR_OPTS=['','better','same','worse'];
var CAP_OPTS=['','brisk','delayed'];
var CULTURE_OPTS=['none','pending','positive','negative'];
var FEED_TYPES=['','NPO','Trophic','Advancing','Full','Fortified'];
var ARROWS={up:'\u2191',down:'\u2193',flat:'\u2192'};
var LS_KEY='sage_v2_session';

/* ===== STATE ===== */
var S={
  screen:'splash',
  sessionId:'',
  patient:{label:'',ga_wk:null,ga_day:null,dol:null,birthWeight:null},
  assessments:[],
  activePanel:'entry',
  activeEntry:null,
  viewRange:'all',
  expandedSections:{resp:true,hemo:true,nutr:true,labs:true,stab:true},
  draft:blankDraft(),
  splashDone:false,
  highlightIdx:null
};

function blankDraft(){
  return {
    dol:'',shift:'D',
    resp:{ventMode:'',fio2:'',peep:'',mapPressure:'',rr:'',cxr:''},
    hemo:{hrMin:'',hrMax:'',meanBP:'',capRefill:'',pressors:false},
    nutr:{feedVol:'',feedType:'',tpn:false,weight:''},
    labs:{crp:'',wbc:'',ph:'',lactate:'',culture:'none'},
    stab:{tempMin:'',tempMax:'',apneas:'',bradys:'',desats:''},
    notes:'',initials:''
  };
}

function genId(){
  var d=new Date();var y=String(d.getFullYear()).slice(2);
  var m=String(d.getMonth()+1).padStart(2,'0');
  var dd=String(d.getDate()).padStart(2,'0');
  var r=Math.random().toString(36).substring(2,6).toUpperCase();
  return 'SG-'+y+m+dd+'-'+r;
}

/* ===== SCORING ENGINE ===== */
function scoreResp(a,prev){
  var s=2;// default stable
  var f=parseFloat(a.resp.fio2);
  if(!isNaN(f)){
    if(f<=21)s=4;else if(f<=30)s=3;else if(f<=40)s=2;else if(f<=60)s=1;else s=0;
  }
  var vm=a.resp.ventMode;
  if(vm==='RA')s=Math.max(s,4);
  else if(vm==='NC'||vm==='HFNC')s=Math.max(s>=3?s:3,s);
  else if(vm==='HFOV'||vm==='HFJV')s=Math.min(s,1);
  // RR factor
  var rr=parseFloat(a.resp.rr);
  if(!isNaN(rr)){
    if(rr>=30&&rr<=60){}// normal — no change
    else if(rr>60&&rr<=80)s=Math.max(0,s-1);
    else if(rr>80)s=Math.max(0,s-2);
    else if(rr<20)s=Math.max(0,s-1);
  }
  if(a.resp.cxr==='worse')s=Math.max(0,s-1);
  else if(a.resp.cxr==='better')s=Math.min(4,s+1);
  if(prev){
    var pf=parseFloat(prev.resp.fio2);
    if(!isNaN(f)&&!isNaN(pf)){
      if(f<pf-5)s=Math.min(4,s+1);
      else if(f>pf+5)s=Math.max(0,s-1);
    }
  }
  return Math.max(0,Math.min(4,s));
}

function scoreHemo(a,prev){
  var s=2;
  var hrLo=parseFloat(a.hemo.hrMin);var hrHi=parseFloat(a.hemo.hrMax);
  // Use midpoint for scoring, but flag wide range as lability
  if(!isNaN(hrLo)&&!isNaN(hrHi)){
    var hrMid=(hrLo+hrHi)/2;var hrSpread=hrHi-hrLo;
    if(hrMid>=120&&hrMid<=180)s=3;
    else if(hrMid>180||hrMid<100)s=1;
    if(hrMid>200||hrMid<80)s=0;
    // Wide HR range = lability penalty
    if(hrSpread>40)s=Math.max(0,s-1);
  }else if(!isNaN(hrLo)){
    // Single value entered in min
    if(hrLo>=120&&hrLo<=180)s=3;
    else if(hrLo>180||hrLo<100)s=1;
    if(hrLo>200||hrLo<80)s=0;
  }
  if(a.hemo.pressors)s=Math.min(s,1);
  if(a.hemo.capRefill==='delayed')s=Math.max(0,s-1);
  var bp=parseFloat(a.hemo.meanBP);
  if(!isNaN(bp)){
    if(bp>=30&&bp<=50)s=Math.min(4,s+1);
    else if(bp<25)s=Math.max(0,s-1);
  }
  if(prev&&prev.hemo.pressors&&!a.hemo.pressors)s=Math.min(4,s+1);
  return Math.max(0,Math.min(4,s));
}

function scoreNutr(a,prev){
  var s=2;
  var ft=a.nutr.feedType;
  if(ft==='NPO')s=0;
  else if(ft==='Trophic')s=1;
  else if(ft==='Advancing')s=2;
  else if(ft==='Full')s=3;
  else if(ft==='Fortified')s=4;
  if(a.nutr.tpn&&s>1)s=Math.max(1,s-1);
  if(prev){
    var pw=parseFloat(prev.nutr.weight);var cw=parseFloat(a.nutr.weight);
    if(!isNaN(pw)&&!isNaN(cw)){
      if(cw>pw)s=Math.min(4,s+1);
      else if(cw<pw)s=Math.max(0,s-1);
    }
  }
  return Math.max(0,Math.min(4,s));
}

function scoreLabs(a,prev){
  var s=3;// default clean
  var crp=parseFloat(a.labs.crp);
  if(!isNaN(crp)){
    if(crp<=0.5)s=4;else if(crp<=2)s=3;else if(crp<=5)s=2;else if(crp<=10)s=1;else s=0;
  }
  if(a.labs.culture==='positive')s=0;
  else if(a.labs.culture==='pending')s=Math.min(s,2);
  var ph=parseFloat(a.labs.ph);
  if(!isNaN(ph)){
    if(ph<7.2)s=Math.max(0,s-1);
    else if(ph>=7.3&&ph<=7.45)s=Math.min(4,s);
  }
  var lac=parseFloat(a.labs.lactate);
  if(!isNaN(lac)&&lac>4)s=Math.max(0,s-1);
  if(prev){
    var pc=parseFloat(prev.labs.crp);
    if(!isNaN(crp)&&!isNaN(pc)){
      if(crp<pc)s=Math.min(4,s+1);
      else if(crp>pc)s=Math.max(0,s-1);
    }
  }
  return Math.max(0,Math.min(4,s));
}

function scoreStab(a,prev){
  var s=3;
  var ap=parseInt(a.stab.apneas)||0;
  var br=parseInt(a.stab.bradys)||0;
  var ds=parseInt(a.stab.desats)||0;
  var events=ap+br+ds;
  if(events===0)s=4;else if(events<=2)s=3;else if(events<=5)s=2;else if(events<=10)s=1;else s=0;
  var tmin=parseFloat(a.stab.tempMin);var tmax=parseFloat(a.stab.tempMax);
  if(!isNaN(tmin)&&!isNaN(tmax)){
    if(tmin>=36.3&&tmax<=37.2){}// stable, no change
    else if(tmin<36.0||tmax>37.5)s=Math.max(0,s-1);
  }
  return Math.max(0,Math.min(4,s));
}

var SCORE_FNS={resp:scoreResp,hemo:scoreHemo,nutr:scoreNutr,labs:scoreLabs,stab:scoreStab};

function scoreAssessment(a,prev){
  var scores={};
  DOMAINS.forEach(function(d){scores[d.key]=SCORE_FNS[d.key](a,prev);});
  var vals=DOMAINS.map(function(d){return scores[d.key];});
  scores.composite=vals.reduce(function(a,b){return a+b;},0)/vals.length;
  return scores;
}

function getCompTier(comp){
  for(var i=0;i<COMP_TIERS.length;i++){if(comp<=COMP_TIERS[i].max)return COMP_TIERS[i];}
  return COMP_TIERS[COMP_TIERS.length-1];
}

function getTrend(scores,key){
  if(scores.length<2)return 'flat';
  var last=scores[scores.length-1][key];
  var prev=scores[scores.length-2][key];
  if(last>prev)return 'up';if(last<prev)return 'down';return 'flat';
}

/* ===== NARRATIVE ENGINE ===== */
function narrative(allScores){
  if(allScores.length===0)return 'DATA SPEAKS: AWAITING INPUT...';
  var latest=allScores[allScores.length-1];
  var parts=[];
  DOMAINS.forEach(function(d){
    var trend=getTrend(allScores,d.key);
    var val=latest[d.key];
    if(trend==='up')parts.push(d.short+' IMPROVING');
    else if(trend==='down')parts.push(d.short+' DECLINING');
    else if(val<=1)parts.push(d.short+' CONCERNING');
  });
  var tier=getCompTier(latest.composite);
  if(parts.length===0){
    if(latest.composite>=3.1)return 'DATA SPEAKS: ALL DOMAINS POSITIVE. '+tier.label+'.';
    return 'DATA SPEAKS: ALL DOMAINS STABLE. STEADY STATE.';
  }
  return 'DATA SPEAKS: '+parts.join('. ')+'. '+tier.label+'.';
}

/* ===== CANVAS DRAWING ===== */
function drawLane(canvasId,scores,domainKey,color,highlightIdx,domainIdx,dols){
  var c=document.getElementById(canvasId);if(!c)return;
  var ctx=c.getContext('2d');
  c.width=c.offsetWidth*2;c.height=c.offsetHeight*2;
  ctx.scale(2,2);
  var W=c.offsetWidth;var H=c.offsetHeight;
  var PAD_B=8;// bottom padding for DOL labels
  var drawH=H-PAD_B;// drawing area height

  // Background
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Horizontal grid (score levels 0-4)
  ctx.strokeStyle='#0a4f0a';ctx.lineWidth=0.5;
  for(var j=0;j<=4;j++){
    var gy=drawH-(j/4)*drawH;
    ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();
  }

  // Center line (score=2, "stable" threshold)
  var centerY=drawH-(2/4)*drawH;
  ctx.strokeStyle='#1a7f1a';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(0,centerY);ctx.lineTo(W,centerY);ctx.stroke();
  ctx.setLineDash([]);

  if(scores.length===0)return;

  // Build data points — X aligned to data index positions
  var pts=[];
  scores.forEach(function(s,i){
    var x=scores.length===1?W/2:(i/(scores.length-1))*W;
    var baseY=drawH-(s[domainKey]/4)*drawH;
    pts.push({x:x,baseY:baseY,val:s[domainKey]});
  });

  // Vertical grid lines at each data point + DOL labels
  ctx.strokeStyle='#0a4f0a';ctx.lineWidth=0.5;
  pts.forEach(function(p,i){
    ctx.beginPath();ctx.moveTo(p.x,0);ctx.lineTo(p.x,drawH);ctx.stroke();
    // DOL label at bottom
    if(dols&&dols[i]!==undefined){
      ctx.fillStyle='#444';ctx.font='7px Courier New';
      ctx.textAlign='center';
      ctx.fillText(dols[i],p.x,H-1);
      ctx.textAlign='left';
    }
  });

  // Helper: get interpolated Y at any progress (0..1) along the data
  function getYAtProgress(prog){
    if(scores.length===1)return pts[0].baseY;
    var dataPos=prog*(scores.length-1);
    var seg=Math.min(Math.floor(dataPos),scores.length-2);
    var frac=dataPos-seg;
    return pts[seg].baseY+(pts[Math.min(seg+1,pts.length-1)].baseY-pts[seg].baseY)*frac;
  }
  function getScoreAtProgress(prog){
    if(scores.length===1)return pts[0].val;
    var dataPos=prog*(scores.length-1);
    var seg=Math.min(Math.floor(dataPos),scores.length-2);
    var frac=dataPos-seg;
    return pts[seg].val+(pts[Math.min(seg+1,pts.length-1)].val-pts[seg].val)*frac;
  }

  var t=S._scanPhase;// 0..1 cycling
  var di=domainIdx||0;// domain index for per-lane variation

  // === V1-STYLE SNAKE: moving head + trailing body ===
  // Each domain gets distinct speed, frequency, and phase offset
  var speeds=[2.0,2.3,1.8,2.6,2.1];
  var freqs=[18,22,15,25,20];
  var phases=[0,1.2,2.5,0.7,3.8];

  var snakeLen=0.40;
  var headPos=(t*speeds[di]+phases[di]*0.1)%1.0;

  var dotCount=80;
  for(var d=0;d<dotCount;d++){
    var dotOffset=d/dotCount*snakeLen;
    var dotProgress=headPos-dotOffset;

    // Wrap around
    if(dotProgress<0)dotProgress+=1.0;
    if(dotProgress>1)dotProgress-=1.0;

    var x=dotProgress*W;
    var baseY=getYAtProgress(dotProgress);
    var scoreHere=getScoreAtProgress(dotProgress);

    // Sinewave undulation — distinct per domain
    var amp=2+Math.abs(scoreHere-2)*1.2;
    var sineY=Math.sin(dotProgress*freqs[di]+S._scanPhase*Math.PI*6+phases[di])*amp;
    var y=Math.max(1,Math.min(drawH-1,baseY+sineY));

    // Trail fade: head bright → tail gone
    var trailFade=1.0-(d/dotCount);
    trailFade=trailFade*trailFade;

    var scoreBright=0.35+0.65*(scoreHere/4);
    var alpha=trailFade*scoreBright;
    if(alpha<0.03)continue;

    ctx.globalAlpha=alpha;ctx.fillStyle=color;

    if(d<3){ctx.fillRect(x-3,y-3,6,6);}// head: big
    else if(d%2===0){ctx.fillRect(x-2,y-2,4,4);}// body: smaller
  }
  ctx.globalAlpha=1;

  // Ghost trail: faint static line showing full trajectory
  if(pts.length>1){
    ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=0.2;
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].baseY);
    for(var k=1;k<pts.length;k++)ctx.lineTo(pts[k].x,pts[k].baseY);
    ctx.stroke();ctx.globalAlpha=1;
  }

  // Anchor dots at actual data points — PROMINENT
  pts.forEach(function(p,i){
    // Outer glow
    ctx.globalAlpha=0.25;ctx.fillStyle=color;
    ctx.fillRect(p.x-5,p.baseY-5,10,10);
    // Inner dot
    var bright=0.6+0.4*(p.val/4);
    ctx.globalAlpha=bright;ctx.fillStyle=color;
    ctx.fillRect(p.x-3,p.baseY-3,6,6);
    // Score value label above dot
    ctx.fillStyle='#fff';ctx.globalAlpha=0.7;ctx.font='8px Courier New';
    ctx.textAlign='center';
    ctx.fillText(p.val,p.x,p.baseY-7);
    ctx.textAlign='left';
    ctx.globalAlpha=1;
    // Highlight selected
    if(highlightIdx!==null&&i===highlightIdx){
      ctx.strokeStyle='#fff';ctx.lineWidth=2;
      ctx.strokeRect(p.x-6,p.baseY-6,12,12);
    }
  });
}

function drawComposite(scores){
  var el=document.getElementById('composite-fill');
  var valEl=document.getElementById('composite-val');
  if(!el||scores.length===0){
    if(el)el.style.width='0%';if(valEl)valEl.textContent='--';return;
  }
  var latest=scores[scores.length-1];
  var pct=(latest.composite/4)*100;
  var tier=getCompTier(latest.composite);
  el.style.width=pct+'%';el.style.background=tier.color;
  valEl.textContent=latest.composite.toFixed(1);
}

function animateSplashLines(){
  var c=document.getElementById('splash-canvas');if(!c)return;
  var ctx=c.getContext('2d');
  var W=600,H=200;c.width=W;c.height=H;
  var colors=['#f83800','#ffa800','#00e8d8','#39ff14','#fc74fc'];
  var started=[false,false,false,false,false];
  var t=0;
  function frame(){
    if(S.screen!=='splash')return;
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,W,H);
    // Stagger start each line
    for(var i=0;i<5;i++){
      if(t>i*30)started[i]=true;
      var cy=20+i*36;
      ctx.strokeStyle=colors[i];ctx.lineWidth=2;
      ctx.beginPath();
      for(var x=0;x<W;x++){
        var amp=started[i]?Math.min(12,(t-i*30)*0.15):0;
        var freq=0.02+i*0.005;
        var phase=t*0.03+i*1.2;
        var y=cy+Math.sin(x*freq+phase)*amp;
        if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    t++;
    requestAnimationFrame(frame);
  }
  frame();
}

/* ===== SCORING HELPERS ===== */
function calcAllScores(){
  var scores=[];
  S.assessments.forEach(function(a,i){
    var prev=i>0?S.assessments[i-1]:null;
    scores.push(scoreAssessment(a,prev));
  });
  return scores;
}

function filterByRange(scores){
  if(S.viewRange==='all'||S.assessments.length===0){
    return S.assessments.map(function(_,i){return i;});
  }
  var days=S.viewRange==='3d'?3:S.viewRange==='7d'?7:14;
  var maxDol=S.assessments[S.assessments.length-1].dol;
  var minDol=maxDol-days;
  var idx=[];
  S.assessments.forEach(function(a,i){if(a.dol>=minDol)idx.push(i);});
  return idx;
}

/* ===== EVENT HANDLING ===== */
app.addEventListener('click',function(e){
  var t=e.target;
  var action=t.getAttribute('data-action');
  if(!action&&t.parentElement)action=t.parentElement.getAttribute('data-action');
  if(!action)return;

  if(action==='start'){S.screen='setup';render();return;}
  if(action==='begin'){
    if(!S.sessionId)S.sessionId=genId();
    S.screen='main';save();render();return;
  }
  if(action==='tab'){
    var tab=t.getAttribute('data-tab')||t.parentElement.getAttribute('data-tab');
    if(tab){S.activePanel=tab;render();}return;
  }
  if(action==='range'){
    var r=t.getAttribute('data-range');if(r){S.viewRange=r;render();}return;
  }
  if(action==='toggle-section'){
    var sec=t.getAttribute('data-section')||t.parentElement.getAttribute('data-section');
    if(sec){S.expandedSections[sec]=!S.expandedSections[sec];render();}return;
  }
  if(action==='submit'){submitAssessment();return;}
  if(action==='highlight'){
    var idx=parseInt(t.getAttribute('data-idx')||t.parentElement.getAttribute('data-idx')||t.parentElement.parentElement.getAttribute('data-idx'));
    if(!isNaN(idx)){S.highlightIdx=S.highlightIdx===idx?null:idx;render();}return;
  }
  if(action==='edit-entry'){
    e.stopPropagation();
    var ei=parseInt(t.getAttribute('data-idx'));
    if(!isNaN(ei)&&S.assessments[ei]){
      S.draft=JSON.parse(JSON.stringify(S.assessments[ei]));
      S.activeEntry=ei;S.activePanel='entry';render();
    }return;
  }
  if(action==='delete-entry'){
    e.stopPropagation();
    var di=parseInt(t.getAttribute('data-idx'));
    if(!isNaN(di)){S.assessments.splice(di,1);S.highlightIdx=null;save();render();}return;
  }
  if(action==='demo'){runDemo();return;}
  if(action==='demo-quick'){generateDemo();return;}
  if(action==='export-csv'){exportCSV();return;}
  if(action==='clear-all'){S.assessments=[];S.highlightIdx=null;S.draft=blankDraft();save();render();return;}
  if(action==='parse-import'){parseImport();return;}
});

app.addEventListener('input',function(e){
  var t=e.target;
  // Setup fields
  var field=t.getAttribute('data-field');
  if(field){
    var v=t.value;
    if(t.type==='number')v=v===''?null:parseFloat(v);
    S.patient[field]=v;
    return;
  }
  // Draft fields
  var draft=t.getAttribute('data-draft');
  if(draft){
    var val=t.type==='checkbox'?t.checked:t.value;
    if(draft.indexOf('.')>-1){
      var parts=draft.split('.');
      S.draft[parts[0]][parts[1]]=val;
    }else{
      S.draft[draft]=val;
    }
  }
});

/* ===== SUBMIT ===== */
function submitAssessment(){
  var d=S.draft;
  if(!d.dol&&d.dol!==0){alert('Enter DOL');return;}
  var a=JSON.parse(JSON.stringify(d));
  a.id=Date.now();
  a.dol=parseInt(a.dol);

  if(S.activeEntry!==null){
    S.assessments[S.activeEntry]=a;
    S.activeEntry=null;
  }else{
    S.assessments.push(a);
    // Sort by DOL then shift
    S.assessments.sort(function(x,y){
      if(x.dol!==y.dol)return x.dol-y.dol;
      return x.shift==='D'?-1:1;
    });
  }
  S.draft=blankDraft();
  // Auto-increment DOL
  S.draft.dol=a.dol;
  S.highlightIdx=null;
  save();render();
}

var demoRunning=false;
var demoAbort=false;

function dW(ms){
  return new Promise(function(resolve){
    if(demoAbort)return resolve();
    setTimeout(resolve,ms);
  });
}

function dFlash(el){
  if(!el)return;
  el.classList.add('demo-field-glow');
  setTimeout(function(){el.classList.remove('demo-field-glow');},700);
}

function dNarrate(stepIdx){
  var n=DEMO_STEPS[stepIdx];
  var bar=document.getElementById('demo-bar');
  if(!bar){
    bar=document.createElement('div');
    bar.id='demo-bar';bar.className='demo-bar';
    document.body.appendChild(bar);
  }

  // Get composite score if we have data
  var compHtml='';
  if(S.assessments.length>0){
    var allSc=calcAllScores();
    var latest=allSc[allSc.length-1];
    var tier=getCompTier(latest.composite);
    compHtml='<div class="demo-comp">'+
      '<div class="demo-comp-val demo-pulse" style="color:'+tier.color+'">'+latest.composite.toFixed(1)+'</div>'+
      '<div class="demo-comp-lbl">COMPOSITE</div></div>';
  }

  bar.innerHTML='<div class="demo-rec"></div>'+
    '<div class="demo-badge">'+n.badge+'</div>'+
    '<div class="demo-text">'+
      '<div class="demo-title">'+n.title+'</div>'+
      '<div class="demo-body">'+n.body+'</div>'+
    '</div>'+compHtml+
    '<button class="demo-stop" onclick="window._stopDemo()">STOP DEMO</button>';

  requestAnimationFrame(function(){bar.classList.add('visible');});
}

function dHideBar(){
  var bar=document.getElementById('demo-bar');
  if(bar)bar.classList.remove('visible');
}

function dSetField(draftPath,val){
  // Set value in state
  if(draftPath.indexOf('.')>-1){
    var parts=draftPath.split('.');
    S.draft[parts[0]][parts[1]]=val;
  }else{
    S.draft[draftPath]=val;
  }
  // Flash the DOM element
  var el=document.querySelector('[data-draft="'+draftPath+'"]');
  if(el){
    if(el.type==='checkbox'){el.checked=val;}
    else{el.value=val;}
    dFlash(el);
  }
}

async function dTypeInto(draftPath,text){
  var el=document.querySelector('[data-draft="'+draftPath+'"]');
  if(!el)return;
  el.value='';el.focus();
  for(var i=0;i<String(text).length;i++){
    if(demoAbort)break;
    el.value+=String(text)[i];
    await dW(40);
  }
  // Set in state
  if(draftPath.indexOf('.')>-1){
    var parts=draftPath.split('.');
    S.draft[parts[0]][parts[1]]=text;
  }else{
    S.draft[draftPath]=text;
  }
  dFlash(el);
}

async function dEnterAssessment(entry,stepIdx){
  if(demoAbort)return;

  // Make sure entry panel is active and sections expanded
  S.activePanel='entry';
  S.expandedSections={resp:true,hemo:true,nutr:true,labs:true,stab:true};
  S.draft=blankDraft();
  render();
  await dW(400);

  // Narrate this step
  dNarrate(stepIdx);
  await dW(1200);
  if(demoAbort)return;

  // DOL + Shift
  await dTypeInto('dol',entry.dol);
  await dW(150);
  dSetField('shift',entry.shift);
  await dW(300);

  // Scroll console to top
  var console=document.querySelector('.console-panel');
  if(console)console.scrollTop=0;

  // Respiratory
  if(entry.resp.ventMode){dSetField('resp.ventMode',entry.resp.ventMode);await dW(200);}
  if(entry.resp.fio2){await dTypeInto('resp.fio2',entry.resp.fio2);await dW(150);}
  if(entry.resp.peep){await dTypeInto('resp.peep',entry.resp.peep);await dW(150);}
  if(entry.resp.mapPressure){await dTypeInto('resp.mapPressure',entry.resp.mapPressure);await dW(150);}
  if(entry.resp.rr){await dTypeInto('resp.rr',entry.resp.rr);await dW(150);}
  if(entry.resp.cxr){dSetField('resp.cxr',entry.resp.cxr);await dW(200);}

  // Scroll down a bit
  if(console)console.scrollTop=console.scrollHeight/4;
  await dW(200);

  // Hemodynamic
  if(entry.hemo.hrMin){await dTypeInto('hemo.hrMin',entry.hemo.hrMin);await dW(150);}
  if(entry.hemo.hrMax){await dTypeInto('hemo.hrMax',entry.hemo.hrMax);await dW(150);}
  if(entry.hemo.meanBP){await dTypeInto('hemo.meanBP',entry.hemo.meanBP);await dW(150);}
  if(entry.hemo.capRefill){dSetField('hemo.capRefill',entry.hemo.capRefill);await dW(200);}
  if(entry.hemo.pressors){dSetField('hemo.pressors',entry.hemo.pressors);await dW(200);}

  // Nutrition
  if(entry.nutr.feedType){dSetField('nutr.feedType',entry.nutr.feedType);await dW(200);}
  if(entry.nutr.feedVol){await dTypeInto('nutr.feedVol',entry.nutr.feedVol);await dW(150);}
  if(entry.nutr.tpn){dSetField('nutr.tpn',entry.nutr.tpn);await dW(200);}
  if(entry.nutr.weight){await dTypeInto('nutr.weight',entry.nutr.weight);await dW(150);}

  if(console)console.scrollTop=console.scrollHeight/2;
  await dW(200);

  // Labs
  if(entry.labs.crp){await dTypeInto('labs.crp',entry.labs.crp);await dW(150);}
  if(entry.labs.wbc){await dTypeInto('labs.wbc',entry.labs.wbc);await dW(150);}
  if(entry.labs.ph){await dTypeInto('labs.ph',entry.labs.ph);await dW(150);}
  if(entry.labs.lactate){await dTypeInto('labs.lactate',entry.labs.lactate);await dW(150);}
  if(entry.labs.culture&&entry.labs.culture!=='none'){dSetField('labs.culture',entry.labs.culture);await dW(200);}

  // Stability
  if(entry.stab.tempMin){await dTypeInto('stab.tempMin',entry.stab.tempMin);await dW(150);}
  if(entry.stab.tempMax){await dTypeInto('stab.tempMax',entry.stab.tempMax);await dW(150);}
  if(entry.stab.apneas){await dTypeInto('stab.apneas',entry.stab.apneas);await dW(150);}
  if(entry.stab.bradys){await dTypeInto('stab.bradys',entry.stab.bradys);await dW(150);}
  if(entry.stab.desats){await dTypeInto('stab.desats',entry.stab.desats);await dW(150);}

  if(console)console.scrollTop=console.scrollHeight;
  await dW(200);

  // Notes
  if(entry.notes){
    S.draft.notes=entry.notes;
    var notesEl=document.querySelector('[data-draft="notes"]');
    if(notesEl){notesEl.value=entry.notes;dFlash(notesEl);}
    await dW(200);
  }

  // Initials
  S.draft.initials=entry.initials||'AS';
  await dW(300);

  // Flash submit button
  var submitBtn=document.querySelector('[data-action="submit"]');
  if(submitBtn)dFlash(submitBtn);
  await dW(500);

  // Submit
  submitAssessment();
  await dW(800);

  // Let user read the narration and see the lanes update
  await dW(2500);
}

async function runDemo(){
  if(demoRunning)return;
  demoRunning=true;
  demoAbort=false;

  // Clear state
  S.assessments=[];
  S.highlightIdx=null;
  S.draft=blankDraft();
  S.screen='splash';
  render();

  // Step 0: Intro narration on splash screen
  await dW(800);
  dNarrate(0);
  await dW(5000);
  if(demoAbort){demoRunning=false;return;}

  // Auto-click PRESS START
  S.screen='setup';render();
  await dW(800);
  if(demoAbort){demoRunning=false;return;}

  // Step 1: Setup — type patient info
  dNarrate(1);
  await dW(600);

  // Type label
  var labelEl=document.querySelector('[data-field="label"]');
  if(labelEl){
    labelEl.value='';labelEl.focus();
    var lbl='BABY_LUNA';
    for(var c=0;c<lbl.length;c++){
      if(demoAbort)break;
      labelEl.value+=lbl[c];
      await dW(60);
    }
    S.patient.label=lbl;dFlash(labelEl);
  }
  await dW(300);

  // Set GA
  var gaWk=document.querySelector('[data-field="ga_wk"]');
  if(gaWk){gaWk.value='24';S.patient.ga_wk=24;dFlash(gaWk);}
  await dW(200);
  var gaDay=document.querySelector('[data-field="ga_day"]');
  if(gaDay){gaDay.value='3';S.patient.ga_day=3;dFlash(gaDay);}
  await dW(200);

  // DOL
  var dolEl=document.querySelector('[data-field="dol"]');
  if(dolEl){dolEl.value='1';S.patient.dol=1;dFlash(dolEl);}
  await dW(200);

  // Birth weight
  var bwEl=document.querySelector('[data-field="birthWeight"]');
  if(bwEl){bwEl.value='620';S.patient.birthWeight=620;dFlash(bwEl);}
  await dW(600);

  // Click Initialize
  var initBtn=document.querySelector('[data-action="begin"]');
  if(initBtn)dFlash(initBtn);
  await dW(500);
  if(!S.sessionId)S.sessionId=genId();
  S.screen='main';save();render();
  await dW(1500);
  if(demoAbort){demoRunning=false;return;}

  // Steps 2-13: Enter assessments one by one
  for(var i=0;i<DEMO_STORY.length;i++){
    if(demoAbort)break;
    await dEnterAssessment(DEMO_STORY[i],i+2);// steps 2..13 are assessment narrations
    if(demoAbort)break;
  }

  if(!demoAbort){
    // Final step: Conclusion
    dNarrate(DEMO_STEPS.length-1);
    // Switch to history tab to show full list
    S.activePanel='history';render();
    await dW(10000);
  }

  // Clean up
  dHideBar();
  demoRunning=false;
  await dW(500);
  var bar=document.getElementById('demo-bar');
  if(bar)bar.remove();
}

  demoAbort=true;

  setTimeout(function(){
    var bar=document.getElementById('demo-bar');
    if(bar)bar.remove();
  },500);
};

/* ===== IMPORT ===== */
function parseImport(){
  var text=document.getElementById('import-text');
  if(!text)return;
  var raw=text.value.trim();
  if(!raw){alert('Paste data first');return;}

  var lines=raw.split('\n').filter(function(l){return l.trim();});
  if(lines.length<2){alert('Need header row + data');return;}

  var headers=lines[0].split('\t').map(function(h){return h.trim().toLowerCase();});
  var preview=document.getElementById('import-preview');
  var tbl='<table><tr>'+headers.map(function(h){return '<th>'+esc(h)+'</th>';}).join('')+'</tr>';

  var parsed=[];
  for(var i=1;i<lines.length;i++){
    var cols=lines[i].split('\t');
    var row={};
    headers.forEach(function(h,j){row[h]=cols[j]?cols[j].trim():'';});
    parsed.push(row);
    tbl+='<tr>'+cols.map(function(c){return '<td>'+esc(c)+'</td>';}).join('')+'</tr>';
  }
  tbl+='</table>';

  // Map to assessments
  var count=0;
  parsed.forEach(function(r){
    var a=blankDraft();
    a.id=Date.now()+Math.random()*1000;
    a.dol=S.patient.dol?parseInt(S.patient.dol)+count:count+1;
    a.shift='D';

    // Fuzzy map columns
    Object.keys(r).forEach(function(k){
      var v=r[k];
      if(k.match(/hr|heart/i)){a.hemo.hrMin=v;a.hemo.hrMax=v;}
      else if(k.match(/rr|resp.*rate|breath/i))a.resp.rr=v;
      else if(k.match(/spo2|sat|o2/i)){/* SpO2 maps to stability context */}
      else if(k.match(/temp/i)){a.stab.tempMin=v;a.stab.tempMax=v;}
      else if(k.match(/fio2|fi.*o2/i))a.resp.fio2=v;
      else if(k.match(/map|mean.*bp/i))a.hemo.meanBP=v;
      else if(k.match(/crp/i))a.labs.crp=v;
      else if(k.match(/wbc|white/i))a.labs.wbc=v;
      else if(k.match(/ph\b/i))a.labs.ph=v;
      else if(k.match(/lact/i))a.labs.lactate=v;
      else if(k.match(/peep/i))a.resp.peep=v;
      else if(k.match(/weight|wt/i))a.nutr.weight=v;
    });

    S.assessments.push(a);
    count++;
  });

  S.assessments.sort(function(x,y){return x.dol-y.dol;});
  save();

  preview.innerHTML=tbl+'<div style="text-align:center;margin-top:8px;color:#39ff14">'+count+' RECORDS IMPORTED</div>';
  setTimeout(render,1500);
}

/* ===== CSV EXPORT ===== */
function exportCSV(){
  if(S.assessments.length===0){alert('No data to export');return;}
  var allScores=calcAllScores();
  var headers=['SessionID','DOL','Shift','VentMode','FiO2','PEEP','MAP_Pressure','RR','CXR',
    'HR_Min','HR_Max','MeanBP','CapRefill','Pressors','FeedType','FeedVol','TPN','Weight',
    'CRP','WBC','pH','Lactate','Culture','TempMin','TempMax','Apneas','Bradys','Desats',
    'Score_Resp','Score_Hemo','Score_Nutr','Score_Labs','Score_Stab','Composite','Notes','Initials'];
  var rows=[headers.join(',')];
  S.assessments.forEach(function(a,i){
    var sc=allScores[i];
    var vals=[S.sessionId,a.dol,a.shift,a.resp.ventMode,a.resp.fio2,a.resp.peep,a.resp.mapPressure,a.resp.rr,a.resp.cxr,
      a.hemo.hrMin,a.hemo.hrMax,a.hemo.meanBP,a.hemo.capRefill,a.hemo.pressors?1:0,a.nutr.feedType,a.nutr.feedVol,a.nutr.tpn?1:0,a.nutr.weight,
      a.labs.crp,a.labs.wbc,a.labs.ph,a.labs.lactate,a.labs.culture,a.stab.tempMin,a.stab.tempMax,a.stab.apneas,a.stab.bradys,a.stab.desats,
      sc.resp,sc.hemo,sc.nutr,sc.labs,sc.stab,sc.composite.toFixed(1),
      '"'+(a.notes||'').replace(/"/g,'""')+'"',a.initials];
    rows.push(vals.join(','));
  });
  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var link=document.createElement('a');
  link.href=url;link.download='SAGE_'+S.sessionId+'_'+new Date().toISOString().slice(0,10)+'.csv';
  link.click();URL.revokeObjectURL(url);
}

/* ===== LOCALSTORAGE ===== */
function save(){
  var data={sessionId:S.sessionId,patient:S.patient,assessments:S.assessments};
  try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}
}
function load(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(raw){
      var data=JSON.parse(raw);
      if(data.sessionId){S.sessionId=data.sessionId;S.patient=data.patient;S.assessments=data.assessments||[];S.screen='main';}
    }
  }catch(e){}
}

/* ===== SCAN LINE ANIMATION ===== */
S._scanPhase=0;
function animateScan(){
  S._scanPhase+=0.002;if(S._scanPhase>1)S._scanPhase=0;
  if(S.screen==='main'){
    var allScores=calcAllScores();
    var filteredIdx=filterByRange(allScores);
    var filtered=filteredIdx.map(function(i){return allScores[i];});
    var hiIdx=S.highlightIdx!==null?filteredIdx.indexOf(S.highlightIdx):null;
    var dols=filteredIdx.map(function(i){return S.assessments[i]?S.assessments[i].dol:'';});
    DOMAINS.forEach(function(d,di){drawLane('lane-'+d.key,filtered,d.key,d.color,hiIdx,di,dols);});
  }
  requestAnimationFrame(animateScan);
}

/* ===== INIT ===== */
load();
render();
animateScan();

})();
</script>
